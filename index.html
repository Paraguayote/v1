<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden Templaria Ecléctica | Paraguay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rojo-templario: #9b111e;
            --pergamino: #f4f1ea;
            --texto: #2c2c2c;
            --blanco: #ffffff;
            --gris-borde: #dddddd;

            --lila: #9370DB;
            --negro: #0D0D0D;
        }

        /* Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Base */
        body {
            background: var(--pergamino);
            color: var(--texto);
            font-family: 'EB Garamond', serif;
            min-height: 100vh;
            display: flex;
        }
        
        /* Marca */
        .brand {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--gris-borde);
            padding: 40px;
            text-align: center;
        }

        .cross {
            font-size: 70px;
            color: var(--rojo-templario);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin: 10px 0;
            color: var(--rojo-templario);
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 2px;
        }

        .lema {
            font-style: italic;
            color: #666;
            margin-top: 20px;
        }
        
        /* Navegación */
        .nav {
            flex: 1;
            background: rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
        }

        .menu {
            list-style: none;
            max-width: 320px;
        }

        .menu li {
            margin: 15px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gris-borde);
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu li span {
            color: var(--rojo-templario);
        }

        /* 👇 Acento lila controlado */
        .menu li:hover {
            color: var(--lila);
            border-color: var(--lila);
        }

        .menu li:hover span {
            color: var(--lila);
        }

        /* Botón principal */
        .btn-access {
            position: absolute;
            top: 30px;
            right: 40px;
            background: var(--rojo-templario);
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            font-size: 0.85rem;
            z-index: 10;
        }

        .btn-access:hover {
            background: var(--negro);
        }
        
        /* Panel */
        #panel {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--pergamino);
            z-index: 100;
            overflow-y: auto;
            padding: 50px;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            color: var(--rojo-templario);
            transition: 0.3s;
        }

        .close-btn:hover {
            color: var(--lila);
        }

        /* Contenido */
        .panel-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .panel-content h2 {
            font-family: 'Cinzel', serif;
            color: var(--rojo-templario);
            border-bottom: 2px solid var(--rojo-templario);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .panel-content h3 {
            font-family: 'Cinzel', serif;
            color: var(--rojo-templario);
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .panel-content p {
            text-align: justify;
            line-height: 1.7;
            margin-bottom: 15px;
        }
        
        /* Cajas */
        .llamado {
            background: rgba(155,17,30,0.05);
            padding: 25px;
            border-left: 4px solid var(--rojo-templario);
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .llamado h3 {
            margin-top: 0;
        }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .valor {
            padding: 20px;
            background: rgba(155,17,30,0.05);
            border-left: 3px solid var(--rojo-templario);
            border-radius: 4px;
        }

        .valor h4 {
            font-family: 'Cinzel', serif;
            color: var(--rojo-templario);
            margin-bottom: 8px;
        }
        
        /* Tablas */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid var(--gris-borde);
            text-align: left;
        }

        th {
            background: rgba(155,17,30,0.1);
            font-family: 'Cinzel', serif;
            color: var(--rojo-templario);
        }
        
        /* Formulario */
        .contact-container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--blanco);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid var(--gris-borde);
        }

        .contact-container h2 {
            text-align: center;
            color: var(--rojo-templario);
            border-bottom: none;
            padding-bottom: 0;
}

        .contact-subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
}

        .contact-container label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: var(--texto);
}

.contact-container input,
.contact-container textarea,
        .contact-container select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--gris-borde);
            margin-top: 6px;
            font-family: inherit;
}

        .contact-container textarea {
            min-height: 120px;
}

        .contact-actions {
            margin-top: 25px;
            display: flex;
            gap: 10px;
}

        /* Botones secundarios */
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
}

        .btn { padding: 12px 20px; color: white; text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.85rem; display: inline-block; transition: 0.3s; background: var(--rojo-templario); border-radius: 4px; border: none; cursor: pointer; }
        .btn:hover { background: var(--negro); }

        /* Stats (preservados y adaptados) */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat { background: rgba(155,17,30,0.05); padding: 15px; text-align: center; border: 1px solid var(--gris-borde); border-radius: 4px; }
        .stat-num { font-size: 1.5rem; font-family: 'Cinzel'; color: var(--rojo-templario); }
        
        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .brand { border-right: none; border-bottom: 1px solid var(--gris-borde); padding: 50px 20px; }
            .nav { padding: 30px 20px; }
            .grid { grid-template-columns: 1fr; }
            .btn-access { top: 15px; right: 15px; padding: 8px 12px; font-size: 0.75rem; }
        }

        /* Efectos Hover para Escudos de Prioratos */
        .escudo-hover {
            transition: all 0.3s ease;
        }
        .escudo-hover:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 12px var(--lila));
        }
    </style>
</head>
<body>

    <!-- Brand -->
    <div class="brand">
        <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 15px;">
            <img src="image/logo/paraguay_ote.png" alt="OTE Paraguay" style="max-width: 80px; height: 80px; object-fit: contain;">
            <img src="image/logo/OTE.png" alt="Orden Templaria Ecléctica" style="max-width: 80px; height: 80px; object-fit: contain;">
        </div>
        <h1>ORDEN TEMPLARIA ECLÉCTICA</h1>
        <p class="subtitle">GRAN PRIORATO NACIONAL NOTRE DAME DEL PARAGUAY</p>
        <p class="lema">"Non nobis, Domine, non nobis, sed Nomini Tuo da gloriam"</p>
        
        <div style="margin-top: 50px; display: flex; gap: 30px; justify-content: center; align-items: flex-end;">
            <a href="Prioratos_Regionales/priorato_pax.html" style="text-decoration: none; text-align: center;">
                <img src="image/logo/escudo_pax.png" alt="Priorato de Pax" style="max-width: 45px; height: 45px; object-fit: contain;" class="escudo-hover">
                <p style="font-family: 'Cinzel', serif; font-size: 0.6rem; color: #666; margin-top: 5px; letter-spacing: 1px;">PAX</p>
            </a>
            <a href="Prioratos_Regionales/priorato_santo_grial.html" style="text-decoration: none; text-align: center;">
                <img src="image/logo/escudo_santo_grial.png" alt="Priorato Santo Grial" style="max-width: 45px; height: 45px; object-fit: contain;" class="escudo-hover">
                <p style="font-family: 'Cinzel', serif; font-size: 0.6rem; color: #666; margin-top: 5px; letter-spacing: 1px;">SANTO GRIAL</p>
            </a>
        </div>
    </div>

    <!-- Nav -->
    <div class="nav">
        <ul class="menu">
            <li onclick="openPanel('origen')"><span style="font-size: 1.5rem;">✠</span> ORIGEN</li>
            <li onclick="openPanel('regla')"><span style="font-size: 1.5rem;">✠</span> REGLAMENTO</li>
            <li onclick="openPanel('autoridades')"><span style="font-size: 1.5rem;">✠</span> AUTORIDADES</li>
            <li onclick="openPanel('reconocimientos')"><span style="font-size: 1.5rem;">✠</span> RECONOCIMIENTOS</li>
            <li onclick="openPanel('unete')"><span style="font-size: 1.5rem;">✠</span> ÚNETE</li>
            <li onclick="openPanel('contacto')"><span style="font-size: 1.5rem;">✠</span> CONTACTO</li>
        </ul>
        <button class="btn-access" onclick="openPanel('miembros')">✠ ACCESO MIEMBROS ✠</button>
    </div>

    <!-- Panel -->
    <div id="panel">
        <div class="close-btn" onclick="closePanel()">[ ← Volver ]</div>
        <div class="panel-content" id="content"></div>
    </div>

    <script>
        // Contenido de cada sección
        var contenido = {
            origen: `
                <div class="llamado">
                    <h3>⚔ El Llamado a la Excelencia ⚔</h3>
                    <p style="font-style: italic;">¿Sientes que el mundo moderno ha perdido su brújula moral? ¿Buscas un propósito que trascienda lo cotidiano?</p>
                    <p><strong>1. Una Tradición Viva</strong><br>No estudiar la historia, continuarla. Te conviertes en eslabón de una cadena desde 1118.</p>
                    <p><strong>2. Formación para el Liderazgo Ético</strong><br>Sabiduría Sagrada, Caballería Práctica y servicio.</p>
                    <p><strong>3. Una Familia Espiritual Global</strong><br>Conectarás con hermanos de todo el mundo.</p>
                    <p><strong>4. El Honor del Mérito</strong><br>El estatus no se compra; se construye.</p>
                </div>
                <h2>✠ ORIGEN Y TRADICIÓN ✠</h2>
                <h3>Herederos de la Milicia Espiritual</h3>
                <p>Fundada en 1118, nuestra Encomienda en Paraguay preserva el conocimiento esotérico, la historia caballeresca y el estudio de las humanidades.</p>
                <p>No somos una reliquia del pasado, sino una <strong>orden viva en busca de la Verdad</strong>.</p>
            `,
            regla: `
                <h2>✠ LA REGLA DE LA ORDEN ✠</h2>
                <div class="grid">
                    <div class="valor"><h4>⚔ RECTITUD</h4><p>Todo acto guiado por la conciencia y razón.</p></div>
                    <div class="valor"><h4>⚡ SILENCIO</h4><p>La sabiduría se custodia en la reflexión.</p></div>
                    <div class="valor"><h4>✛ AUXILIO</h4><p>Asistencia al desvalido sin recompensa.</p></div>
                    <div class="valor"><h4>⚜ FRATERNIDAD</h4><p>Vínculo eterno entre hermanos.</p></div>
                </div>
            `,
            autoridades: `
                <h2>✠ CUADRO DE AUTORIDADES ✠</h2>
                <table>
                    <tr><th>Dignidad</th><th>Función</th></tr>
                    <tr><td>Gran Prior</td><td>Custodio de la Orden y Dirección Suprema</td></tr>
                    <tr><td>Prior</td><td>Gestión del Gran Priorato</td></tr>
                    <tr><td>Comendador</td><td>Responsable de Encomienda Local</td></tr>
                    <tr><td>Caballero/Dama</td><td>Miembro de Pleno Derecho</td></tr>
                    <tr><td>Escudero</td><td>Miembro en Formación</td></tr>
                    <tr><td>Novicio/Postulante</td><td>Candidato en Evaluación</td></tr>
                </table>
            `,
            contacto: `
                <div class="contact-container">
                    <h2>✠ CONTACTO Y CONSULTAS ✠</h2>
                    <p class="contact-subtitle">
                        Redacta tu mensaje y elige el canal por el cual deseas remitirlo
                    </p>

                    <form id="contactForm">
                        <label>Asunto</label>
                        <select id="asunto">
                            <option>Consulta institucional</option>
                            <option>Soporte técnico</option>
                            <option>Asunto académico</option>
                            <option>Otro</option>
                        </select>

                        <label>Mensaje</label>
                        <textarea id="mensaje" placeholder="Escribe tu mensaje con claridad..."></textarea>

                        <label>Nombre</label>
                        <input type="text" id="nombre" placeholder="Tu nombre completo">

                        <label>Organización</label>
                        <input type="text" id="organizacion" placeholder="Opcional">

                        <div class="contact-actions">
                            <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">💬 Enviar WhatsApp</button>
                        </div>
                    </form>
                </div>
            `,
            reconocimientos: `
                <h2>✠ RECONOCIMIENTOS ✠</h2>
                <p>La Orden Templaria Ecléctica ha recibido reconocimiento por su labor en:</p>
                <div class="grid" style="margin-top: 20px;">
                    <div class="valor"><h4>🎖 SERVICIO COMUNITARIO</h4><p>Reconocimiento por proyectos sociales y humanitarios.</p></div>
                    <div class="valor"><h4>📜 TRADICIÓN HISTÓRICA</h4><p>Custodia del patrimonio templario y hermético.</p></div>
                    <div class="valor"><h4>🌎 RED INTERNACIONAL</h4><p>Presencia en múltiples países brotheriles.</p></div>
                    <div class="valor"><h4>🔱 FORMACIÓN INTEGRAL</h4><p>Programas de desarrollo personal y espiritual.</p></div>
                </div>
            `,
            unete: `
                <h2>✠ ÚNETE A NOSOTROS ✠</h2>
                
                <div class="llamado">
                    <h3>El Llamado de la Orden</h3>
                    <p>Si en lo profundo percibes que el mundo moderno ha debilitado su centro espiritual, si anhelas un propósito que eleve tu vida más allá de lo ordinario, y si deseas avanzar en un camino de crecimiento junto a hermanos unidos por la misma búsqueda…</p>
                    <p>La Orden abre sus puertas a quienes están dispuestos a recorrer el sendero con rectitud, disciplina y honor.</p>
                    <p style="margin-top: 15px;"><strong>Aquí no se promete facilidad, sino <span style="color: var(--rojo-templario);">transformación</span>.</strong><br>
                    <strong>No se ofrece pertenencia vacía, sino <span style="color: var(--rojo-templario);">compromiso consciente</span>.</strong></p>
                </div>

                <h3>Requisitos de Ingreso</h3>
                <ul style="margin-left: 20px; line-height: 1.8;">
                    <li>• Mayoría de edad</li>
                    <li>• Voluntad firme de búsqueda de la verdad</li>
                    <li>• Vocación de servicio desinteresado</li>
                    <li>• Disposición real para la formación continua</li>
                    <li>• Conducta íntegra acorde a los principios de la Orden</li>
                </ul>

                <p style="text-align: center; margin-top: 30px; font-style: italic; color: var(--rojo-templario); font-size: 1.1rem;">
                    “Non nobis, Domine, non nobis, sed Nomini Tuo da gloriam.”
                </p>

                <div style="text-align: center; margin-top: 30px;">
                    <a href="Web_y_Redes/formulario_ingreso.html" class="btn" style="display: inline-block; padding: 15px 30px; font-size: 1.1rem;">✠ SOLICITAR INGRESO ✠</a>
                </div>
            `,
            miembros: `
                <h2>✠ ÁREA DE MIEMBROS ✠</h2>
                <p style="text-align: center; margin-bottom: 30px;">Bienvenido, Hermano.</p>
                
                <h3>⚔ GESTIÓN DE LA ORDEN</h3>
                <ul style="margin-left: 20px;">
                    <li style="margin-bottom: 10px;"><strong>Registro de Miembros</strong><br>Carpeta de Integrantes, fichas, historial</li>
                    <li style="margin-bottom: 10px;"><strong>Gestión de Encomiendas</strong><br>Asunción Centro, Graneros del Norte, San Antonio, Ciudad del Este</li>
                    <li style="margin-bottom: 10px;"><strong>Programa de Formación</strong><br>5 módulos: Filosofía, Hermetismo, Gnosis, Simbolismo, Ética</li>
                    <li style="margin-bottom: 10px;"><strong>Calendario de Actividades</strong><br>Tenidas, Capítulos, Rituales</li>
                    <li style="margin-bottom: 10px;"><strong>Archivo Documental</strong><br>Estatutos, Rituales, Actas</li>
                </ul>
                
                <h3>⚔ ESTADÍSTICAS</h3>
                <div class="stats">
                    <div class="stat"><div class="stat-num">24</div><div>Miembros</div></div>
                    <div class="stat"><div class="stat-num">4</div><div>Encomiendas</div></div>
                    <div class="stat"><div class="stat-num">8</div><div>Documentos</div></div>
                </div>
                
                <div style="text-align: center;">
                    <p style="margin-bottom: 15px; font-size: 1.2rem;">⚙ DESARROLLO 199% ⚙</p>
                    <a href="mailto:granprioratodelparaguay.ote@gmail.com?subject=Solicitud acceso" class="btn">✠ DESARROLLAR ✠</a>
                </div>
            `
        };

        function openPanel(seccion) {
            if (seccion === 'miembros') {
                var code = prompt("Código de acceso:");
                if (code !== "123") {
                    alert("Código incorrecto.");
                    return;
                }
            }
            document.getElementById('content').innerHTML = contenido[seccion];
            document.getElementById('panel').style.display = 'block';
        }

        function closePanel() {
            document.getElementById('panel').style.display = 'none';
        }

        function obtenerMensaje() {
            const asunto = document.getElementById("asunto")?.value || "";
            const mensaje = document.getElementById("mensaje")?.value || "";
            const nombre = document.getElementById("nombre")?.value || "";
            const org = document.getElementById("organizacion")?.value || "";
            const email = document.getElementById("email")?.value || "";

            return encodeURIComponent(
                "✠ CONTACTO OTE ✠\n\nAsunto: " + asunto + "\n\n" + mensaje + "\n\nNombre: " + nombre + "\nOrganización: " + org + "\nEmail: " + email
            );
        }

        function enviarEmail() {
            const cuerpo = obtenerMensaje();
            window.location.href = "mailto:granprioratodelparaguay.ote@gmail.com?subject=Contacto OTE&body=" + cuerpo;
        }

        function enviarWhatsApp() {
            const cuerpo = obtenerMensaje();
            const telefono = "595994340472";
            window.open("https://wa.me/" + telefono + "?text=" + cuerpo, "_blank");
        }
    </script>
</body>
</html>
